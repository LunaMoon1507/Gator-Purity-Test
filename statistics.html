<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gator Purity Test Statistics</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="Gator-icon.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <div class="top-nav">
            <a href="index.html" class="stats-btn">Take the Quiz</a>
        </div>

        <header>
            <h1><span class="uf-blue">Campus</span> <span class="uf-orange">Analytics</span></h1>
            <p class="intro">Live statistics based on anonymous student submissions.</p>
        </header>

        <div id="loading-msg">Fetching latest data from the server...</div>

        <div id="dashboard-content" class="hidden">
            <div class="dashboard">
                <div class="stat-card">
                    <h3>Average Score</h3>
                    <div class="stat-value" id="avg-score">--</div>
                    <div class="stat-meta">Out of 100</div>
                </div>
                <div class="stat-card">
                    <h3>Highest Score</h3>
                    <div class="stat-value" id="high-score">--</div>
                    <div class="stat-meta" id="high-major">Major: --</div>
                </div>
                <div class="stat-card">
                    <h3>Lowest Score</h3>
                    <div class="stat-value" id="low-score">--</div>
                    <div class="stat-meta" id="low-major">Major: --</div>
                </div>
            </div>

            <div class="analytics-menu-container">
                <label for="analytics-select" class="analytics-menu-label">View more analytics:</label>
                <select id="analytics-select" class="analytics-select" aria-label="View more analytics">
                    <option value="" selected>Choose your graph...</option>
                    <option value="average-scores-last-30">Average Scores (Last 30 Days)</option>
                    <option value="scores-vs-age">Scores vs. Age</option>
                    <option value="majors-highest">Majors with the highest scores</option>
                    <option value="majors-lowest">Majors with the lowest scores</option>
                </select>
            </div>

            <div id="chart-loading-msg" class="hidden">Loading analytics...</div>

            <div id="chart-container" class="chart-container hidden">
                <h3 id="chart-title" class="chart-title">Average Scores (Last 30 Days)</h3>
                <canvas id="scoreChart"></canvas>
                <div id="rankings-view" class="hidden"></div>
            </div>
        </div>
    </div>

    <script src="stats.js"></script>
</body>
</html>
